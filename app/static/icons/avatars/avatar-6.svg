<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ninja Avatar -->
  <defs>
    <linearGradient id="ninjaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935"/>
      <stop offset="100%" style="stop-color:#d32f2f"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#ninjaBg)"/>
  <!-- Head wrap -->
  <ellipse cx="50" cy="50" rx="32" ry="30" fill="#2D3436"/>
  <!-- Eye band opening -->
  <rect x="15" y="40" width="70" height="18" fill="#2D3436"/>
  <!-- Face visible part (eyes) -->
  <rect x="18" y="42" width="64" height="14" fill="#FFE4C9"/>
  <!-- Eyes -->
  <ellipse cx="35" cy="49" rx="8" ry="6" fill="white"/>
  <ellipse cx="65" cy="49" rx="8" ry="6" fill="white"/>
  <ellipse cx="36" cy="49" rx="5" ry="4" fill="#2D3436"/>
  <ellipse cx="66" cy="49" rx="5" ry="4" fill="#2D3436"/>
  <circle cx="37" cy="48" r="2" fill="white"/>
  <circle cx="67" cy="48" r="2" fill="white"/>
  <!-- Determined eyebrows -->
  <path d="M25 40 L42 44" stroke="#2D3436" stroke-width="3" stroke-linecap="round"/>
  <path d="M75 40 L58 44" stroke="#2D3436" stroke-width="3" stroke-linecap="round"/>
  <!-- Headband knot -->
  <ellipse cx="85" cy="45" rx="8" ry="6" fill="#e53935"/>
  <path d="M88 38 Q95 30 90 22" stroke="#e53935" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M88 52 Q95 60 92 70" stroke="#e53935" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Shuriken decoration -->
  <g transform="translate(15, 15)">
    <path d="M10 5 L12 10 L10 8 L8 10 Z" fill="#BDBDBD"/>
    <path d="M10 15 L8 10 L10 12 L12 10 Z" fill="#BDBDBD"/>
    <path d="M5 10 L10 8 L8 10 L10 12 Z" fill="#BDBDBD"/>
    <path d="M15 10 L10 12 L12 10 L10 8 Z" fill="#BDBDBD"/>
    <circle cx="10" cy="10" r="2" fill="#757575"/>
  </g>
</svg>
