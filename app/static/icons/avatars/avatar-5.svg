<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Astronaut Avatar -->
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#spaceBg)"/>
  <!-- Stars -->
  <circle cx="15" cy="20" r="1.5" fill="white"/>
  <circle cx="85" cy="25" r="1" fill="white"/>
  <circle cx="80" cy="75" r="1.5" fill="white"/>
  <circle cx="20" cy="80" r="1" fill="white"/>
  <circle cx="75" cy="15" r="2" fill="#FFE66D"/>
  <!-- Helmet -->
  <ellipse cx="50" cy="52" rx="30" ry="32" fill="#E8E8E8"/>
  <ellipse cx="50" cy="52" rx="26" ry="28" fill="#4FC3F7"/>
  <ellipse cx="50" cy="52" rx="22" ry="24" fill="#0288D1"/>
  <!-- Face reflection -->
  <ellipse cx="42" cy="45" rx="8" ry="10" fill="#4FC3F7" opacity="0.5"/>
  <!-- Face -->
  <ellipse cx="50" cy="55" rx="18" ry="16" fill="#FFE4C9"/>
  <!-- Eyes -->
  <ellipse cx="43" cy="52" rx="4" ry="5" fill="white"/>
  <ellipse cx="57" cy="52" rx="4" ry="5" fill="white"/>
  <circle cx="44" cy="53" r="2.5" fill="#2D3436"/>
  <circle cx="58" cy="53" r="2.5" fill="#2D3436"/>
  <circle cx="45" cy="52" r="1" fill="white"/>
  <circle cx="59" cy="52" r="1" fill="white"/>
  <!-- Happy mouth -->
  <path d="M45 62 Q50 67 55 62" stroke="#2D3436" stroke-width="2" fill="none"/>
  <!-- Blush -->
  <ellipse cx="38" cy="60" rx="4" ry="2" fill="#FFB8B8" opacity="0.6"/>
  <ellipse cx="62" cy="60" rx="4" ry="2" fill="#FFB8B8" opacity="0.6"/>
  <!-- Helmet rim -->
  <ellipse cx="50" cy="52" rx="30" ry="32" fill="none" stroke="#BDBDBD" stroke-width="4"/>
</svg>
