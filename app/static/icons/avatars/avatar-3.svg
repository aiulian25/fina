<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Money Eyes Robot Avatar -->
  <defs>
    <linearGradient id="robotBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#robotBg)"/>
  <!-- Antenna -->
  <line x1="50" y1="5" x2="50" y2="18" stroke="#4ECDC4" stroke-width="4"/>
  <circle cx="50" cy="5" r="5" fill="#FFE66D"/>
  <!-- Head -->
  <rect x="18" y="22" width="64" height="55" rx="10" fill="#4ECDC4"/>
  <rect x="22" y="26" width="56" height="47" rx="8" fill="#2D3436"/>
  <!-- Eyes - Dollar signs -->
  <circle cx="35" cy="48" r="12" fill="#FFE66D"/>
  <circle cx="65" cy="48" r="12" fill="#FFE66D"/>
  <text x="35" y="54" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">$</text>
  <text x="65" y="54" font-size="16" font-weight="bold" fill="#2D3436" text-anchor="middle">$</text>
  <!-- Mouth - LED display -->
  <rect x="30" y="65" width="40" height="8" rx="2" fill="#4ECDC4"/>
  <rect x="33" y="67" width="6" height="4" fill="#2D3436"/>
  <rect x="42" y="67" width="6" height="4" fill="#2D3436"/>
  <rect x="51" y="67" width="6" height="4" fill="#2D3436"/>
  <rect x="60" y="67" width="6" height="4" fill="#2D3436"/>
  <!-- Bolts -->
  <circle cx="22" cy="48" r="4" fill="#FFE66D"/>
  <circle cx="78" cy="48" r="4" fill="#FFE66D"/>
</svg>
